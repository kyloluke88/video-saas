version: 0.0
os: linux

files:
  - source: docker-compose.prod.yml
    destination: /opt/video-saas/release
  - source: docker-compose.worker.prod.yml
    destination: /opt/video-saas/release
  - source: infra/aws
    destination: /opt/video-saas/release

hooks:
  AfterInstall:
    - location: infra/aws/scripts/prepare_release.sh
      timeout: 180
      runas: root
  ApplicationStart:
    - location: infra/aws/scripts/deploy.sh
      timeout: 1800
      runas: root
  ValidateService:
    - location: infra/aws/scripts/validate.sh
      timeout: 300
      runas: root
